name: Deploy Preview to Netlify

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
        
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      
      - name: Deploy to Netlify Preview
        id: deploy
        run: |
          DEPLOY=$(netlify deploy \
            --dir=dist \
            --site=$NETLIFY_SITE_ID \
            --auth=$NETLIFY_AUTH_TOKEN \
            --alias=pr-${{ github.event.pull_request.number }} \
            --message="Preview for PR #${{ github.event.pull_request.number }}" \
            --json)

          echo "$DEPLOY"

          echo "deploy_url=$(echo "$DEPLOY" | jq -r '.deploy_url')" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment Preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: netlify-preview
          message: |
            ## 🚀 Netlify Preview
            ✅ Se desplegó correctamente una vista previa para este PR.
             **Preview URL:**
            ${{ steps.deploy.outputs.deploy_url }}

            ---
            Commit: `${{ github.sha }}`
